<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify Forms Detection</title>
  </head>
  <body>
    <form name="quote-inquiry" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="quote-inquiry" />
      <input name="bot-field" type="text" />
      <input name="company_name" type="text" />
      <input name="contact_person" type="text" />
      <input name="phone" type="text" />
      <input name="email" type="email" />
      <input name="product_interest" type="text" />
      <input name="selected_material" type="text" />
      <input name="selected_price" type="text" />
      <input name="unit" type="text" />
      <input name="quantity" type="text" />
      <textarea name="message"></textarea>
      <input name="selected_product" type="text" />
      <input name="selected_unit" type="text" />
      <input name="quote_source" type="text" />
      <input name="utm_source" type="text" />
      <input name="utm_medium" type="text" />
      <input name="utm_campaign" type="text" />
      <input name="utm_content" type="text" />
      <input name="utm_term" type="text" />
    </form>
  </body>
</html>
