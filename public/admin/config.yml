# Decap CMS uses the GitHub backend for this project.
# Replace repo below if you fork or move the repository.
backend:
  name: github
  repo: TheGreatMan1/hotel-textile-website
  branch: main

media_folder: "public/uploads/images"
public_folder: "/uploads/images"

collections:
  - name: "site_settings"
    label: "Site Settings"
    files:
      - name: "settings"
        label: "Global SEO and Settings"
        file: "src/content/settings.json"
        editor:
          preview: false
        fields:
          - { label: "Site Name", name: "siteName", widget: "string" }
          - { label: "Default Language", name: "defaultLanguage", widget: "select", options: ["en", "ge"] }
          - { label: "SEO Title", name: "seoTitle", widget: "string" }
          - { label: "SEO Description", name: "seoDescription", widget: "text" }
          - { label: "Admin Note", name: "adminNote", widget: "text", required: false }

  - name: "english_page_content"
    label: "English Page Content"
    files:
      - name: "site_en"
        label: "English Header, Hero, Why Us, About"
        file: "src/content/site.en.json"
        editor:
          preview: false
        fields: &site_fields
          - { label: "Brand Name", name: "brandName", widget: "string" }
          - { label: "Header Tagline", name: "tagline", widget: "string" }
          - label: "Navigation Links"
            name: "navLinks"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Link", name: "href", widget: "string" }
              - { label: "Section Key", name: "sectionKey", widget: "select", options: ["hero", "interactiveBed", "products", "whyChooseUs", "about", "gallery", "catalog", "process", "map", "quoteForm", "contact"] }
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Show Hero", name: "isVisible", widget: "boolean", default: true }
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "text" }
              - { label: "Primary Button Text", name: "primaryButtonText", widget: "string" }
              - { label: "Primary Button Link", name: "primaryButtonLink", widget: "string" }
              - { label: "Secondary Button Text", name: "secondaryButtonText", widget: "string" }
              - { label: "Secondary Button Link", name: "secondaryButtonLink", widget: "string" }
              - { label: "Hero Image", name: "image", widget: "image" }
              - { label: "Hero Image Alt Text", name: "imageAlt", widget: "string" }
              - label: "Hero Stat Cards"
                name: "stats"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Icon", name: "icon", widget: "select", options: ["Sparkles", "Ruler", "Truck", "Gem", "RefreshCw", "Moon", "BadgeCheck", "Layers", "ConciergeBell", "MessagesSquare", "FileText", "MousePointerClick"] }
                  - { label: "Show", name: "isVisible", widget: "boolean", default: true }
                  - { label: "Sort Order", name: "sortOrder", widget: "number", value_type: "int" }
          - label: "Why Hotels Choose Us"
            name: "whyChooseUs"
            widget: "object"
            fields:
              - { label: "Show Section", name: "isVisible", widget: "boolean", default: true }
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "text" }
              - label: "Feature Cards"
                name: "features"
                widget: "list"
                fields: &feature_fields
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Icon", name: "icon", widget: "select", options: ["Sparkles", "Ruler", "Truck", "Gem", "RefreshCw", "Moon", "BadgeCheck", "Layers", "ConciergeBell", "MessagesSquare", "FileText", "MousePointerClick"] }
                  - { label: "Show", name: "isVisible", widget: "boolean", default: true }
                  - { label: "Sort Order", name: "sortOrder", widget: "number", value_type: "int" }
          - label: "About Section"
            name: "about"
            widget: "object"
            fields:
              - { label: "Show About", name: "isVisible", widget: "boolean", default: true }
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Image Alt Text", name: "imageAlt", widget: "string" }
              - label: "Feature Points"
                name: "features"
                widget: "list"
                fields: *feature_fields

  - name: "georgian_page_content"
    label: "Georgian Page Content"
    files:
      - name: "site_ge"
        label: "Georgian Header, Hero, Why Us, About"
        file: "src/content/site.ge.json"
        editor:
          preview: false
        fields: *site_fields

  - name: "english_products"
    label: "English Products"
    files:
      - name: "products_en"
        label: "English Product Collections"
        file: "src/content/products.en.json"
        editor:
          preview: false
        fields: &product_collection_fields
          - { label: "Show Product Collections", name: "isVisible", widget: "boolean", default: true }
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Material Label", name: "materialLabel", widget: "string" }
          - { label: "Sizes Label", name: "sizesLabel", widget: "string" }
          - { label: "Colors Label", name: "colorsLabel", widget: "string" }
          - label: "Products"
            name: "items"
            widget: "list"
            fields:
              - { label: "Slug", name: "slug", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Category", name: "category", widget: "string" }
              - { label: "Short Description", name: "shortDescription", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Image Alt Text", name: "imageAlt", widget: "string" }
              - { label: "Button Text", name: "buttonText", widget: "string" }
              - { label: "Button Link", name: "buttonLink", widget: "string", required: false }
              - { label: "Material", name: "material", widget: "string", required: false }
              - { label: "Available Sizes", name: "availableSizes", widget: "list", required: false, field: { label: "Size", name: "size", widget: "string" } }
              - { label: "Color Options", name: "colorOptions", widget: "list", required: false, field: { label: "Color", name: "color", widget: "string" } }
              - { label: "Show Product", name: "isVisible", widget: "boolean", default: true }
              - { label: "Sort Order", name: "sortOrder", widget: "number", value_type: "int" }
              - { label: "Show Price", name: "showPrice", widget: "boolean", default: true }
              - { label: "Price Type", name: "priceType", widget: "select", options: ["fixed", "from", "range", "custom"] }
              - { label: "Price", name: "price", widget: "string", required: false }
              - { label: "Price Min", name: "priceMin", widget: "string", required: false }
              - { label: "Price Max", name: "priceMax", widget: "string", required: false }
              - { label: "Unit", name: "unit", widget: "string", required: false }
              - { label: "Price Note", name: "priceNote", widget: "string", required: false }

  - name: "georgian_products"
    label: "Georgian Products"
    files:
      - name: "products_ge"
        label: "Georgian Product Collections"
        file: "src/content/products.ge.json"
        editor:
          preview: false
        fields: *product_collection_fields

  - name: "english_interactive_bed"
    label: "English Interactive Bed"
    files:
      - name: "interactive_bed_en"
        label: "English Interactive Bed Explorer"
        file: "src/content/interactive-bed.en.json"
        editor:
          preview: false
        fields: &interactive_bed_fields
          - { label: "Show Interactive Bed", name: "isVisible", widget: "boolean", default: true }
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Subtitle", name: "subtitle", widget: "text" }
          - { label: "Bed Image", name: "bedImage", widget: "image" }
          - { label: "Bed Image Alt Text", name: "bedImageAlt", widget: "string" }
          - { label: "View Product Button Text", name: "viewProductText", widget: "string" }
          - { label: "Contact Button Text", name: "contactText", widget: "string" }
          - { label: "Close Text", name: "closeText", widget: "string" }
          - { label: "Materials Label", name: "materialsLabel", widget: "string" }
          - { label: "Sizes Label", name: "sizesLabel", widget: "string" }
          - { label: "Colors Label", name: "colorsLabel", widget: "string" }
          - { label: "Mobile List Title", name: "mobileListTitle", widget: "string" }
          - label: "Hotspots"
            name: "hotspots"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Hotspot Label", name: "label", widget: "string" }
              - { label: "Category", name: "category", widget: "string" }
              - { label: "Short Description", name: "shortDescription", widget: "text" }
              - { label: "Long Description", name: "longDescription", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Image Alt Text", name: "imageAlt", widget: "string" }
              - { label: "Position X Percent", name: "x", widget: "number", value_type: "float", min: 0, max: 100 }
              - { label: "Position Y Percent", name: "y", widget: "number", value_type: "float", min: 0, max: 100 }
              - { label: "Show Hotspot", name: "isVisible", widget: "boolean", default: true }
              - { label: "Linked Product Slug", name: "linkedProductSlug", widget: "string", required: false }
              - { label: "Show Price", name: "showPrice", widget: "boolean", default: true }
              - { label: "Price Type", name: "priceType", widget: "select", options: ["fixed", "from", "range", "custom"] }
              - { label: "Price", name: "price", widget: "string", required: false }
              - { label: "Price Min", name: "priceMin", widget: "string", required: false }
              - { label: "Price Max", name: "priceMax", widget: "string", required: false }
              - { label: "Unit", name: "unit", widget: "string", required: false }
              - { label: "Price Note", name: "priceNote", widget: "string", required: false }
              - label: "Material Variants"
                name: "materialVariants"
                widget: "list"
                fields:
                  - { label: "ID", name: "id", widget: "string" }
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "Show Variant", name: "isVisible", widget: "boolean", default: true }
                  - { label: "Description", name: "description", widget: "text" }
                  - { label: "Image", name: "image", widget: "image" }
                  - { label: "Image Alt Text", name: "imageAlt", widget: "string" }
                  - { label: "Sizes", name: "sizes", widget: "list", required: false, field: { label: "Size", name: "size", widget: "string" } }
                  - { label: "Colors", name: "colors", widget: "list", required: false, field: { label: "Color", name: "color", widget: "string" } }
                  - { label: "Show Price", name: "showPrice", widget: "boolean", default: true }
                  - { label: "Price Type", name: "priceType", widget: "select", options: ["fixed", "from", "range", "custom"] }
                  - { label: "Price", name: "price", widget: "string", required: false }
                  - { label: "Price Min", name: "priceMin", widget: "string", required: false }
                  - { label: "Price Max", name: "priceMax", widget: "string", required: false }
                  - { label: "Unit", name: "unit", widget: "string", required: false }
                  - { label: "Price Note", name: "priceNote", widget: "string", required: false }

  - name: "georgian_interactive_bed"
    label: "Georgian Interactive Bed"
    files:
      - name: "interactive_bed_ge"
        label: "Georgian Interactive Bed Explorer"
        file: "src/content/interactive-bed.ge.json"
        editor:
          preview: false
        fields: *interactive_bed_fields

  - name: "gallery"
    label: "Gallery"
    files:
      - name: "gallery"
        label: "Gallery Images"
        file: "src/content/gallery.json"
        editor:
          preview: false
        fields:
          - { label: "Show Gallery", name: "isVisible", widget: "boolean", default: true }
          - label: "Eyebrow"
            name: "eyebrow"
            widget: "object"
            fields: &localized_text_fields
              - { label: "English", name: "en", widget: "string" }
              - { label: "Georgian", name: "ge", widget: "string" }
          - { label: "Title", name: "title", widget: "object", fields: *localized_text_fields }
          - { label: "Description", name: "description", widget: "object", fields: *localized_text_fields }
          - label: "Images"
            name: "images"
            widget: "list"
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Alt Text", name: "alt", widget: "string" }
              - { label: "Caption", name: "caption", widget: "object", fields: *localized_text_fields }
              - { label: "Show Image", name: "isVisible", widget: "boolean", default: true }
              - { label: "Sort Order", name: "sortOrder", widget: "number", value_type: "int" }

  - name: "contact_settings"
    label: "Contact Settings"
    files:
      - name: "contact"
        label: "Contact Section"
        file: "src/content/contact.json"
        editor:
          preview: false
        fields:
          - { label: "Show Contact", name: "isVisible", widget: "boolean", default: true }
          - { label: "Eyebrow", name: "eyebrow", widget: "object", fields: *localized_text_fields }
          - { label: "Title", name: "title", widget: "object", fields: *localized_text_fields }
          - { label: "Description", name: "description", widget: "object", fields: *localized_text_fields }
          - label: "Contact Methods"
            name: "methods"
            widget: "list"
            fields:
              - { label: "Method Key", name: "key", widget: "select", options: ["phone", "whatsapp", "email", "instagram", "facebook"] }
              - { label: "Show Method", name: "isVisible", widget: "boolean", default: true }
              - { label: "Label", name: "label", widget: "object", fields: *localized_text_fields }
              - { label: "Value", name: "value", widget: "string" }
              - { label: "URL", name: "url", widget: "string", required: false }

  - name: "catalog_settings"
    label: "Catalog Settings"
    files:
      - name: "catalog"
        label: "Catalog PDF Section"
        file: "src/content/catalog.json"
        editor:
          preview: false
        fields:
          - { label: "Show Catalog", name: "isVisible", widget: "boolean", default: true }
          - { label: "Eyebrow", name: "eyebrow", widget: "object", fields: *localized_text_fields }
          - { label: "Title", name: "title", widget: "object", fields: *localized_text_fields }
          - { label: "Description", name: "description", widget: "object", fields: *localized_text_fields }
          - { label: "Button Text", name: "buttonText", widget: "object", fields: *localized_text_fields }
          - { label: "No PDF Text", name: "noFileText", widget: "object", fields: *localized_text_fields }
          - { label: "PDF File", name: "pdfFile", widget: "file", required: false, media_folder: "public/uploads/catalog", public_folder: "/uploads/catalog" }

  - name: "map_settings"
    label: "Map Settings"
    files:
      - name: "map"
        label: "Map and Location"
        file: "src/content/map.json"
        editor:
          preview: false
        fields:
          - { label: "Show Map", name: "isVisible", widget: "boolean", default: true }
          - { label: "Eyebrow", name: "eyebrow", widget: "object", fields: *localized_text_fields }
          - { label: "Title", name: "title", widget: "object", fields: *localized_text_fields }
          - { label: "Address", name: "address", widget: "object", fields: *localized_text_fields }
          - { label: "Google Maps Embed URL", name: "embedUrl", widget: "string", required: false }
          - { label: "Button Text", name: "buttonText", widget: "object", fields: *localized_text_fields }
          - { label: "External Google Maps Link", name: "externalLink", widget: "string", required: false }

  - name: "quote_form"
    label: "Quote Form"
    files:
      - name: "quote_form"
        label: "Quote / Inquiry Form"
        file: "src/content/quote-form.json"
        editor:
          preview: false
        fields:
          - { label: "Show Quote Form", name: "isVisible", widget: "boolean", default: true }
          - { label: "Eyebrow", name: "eyebrow", widget: "object", fields: *localized_text_fields }
          - { label: "Title", name: "title", widget: "object", fields: *localized_text_fields }
          - { label: "Description", name: "description", widget: "object", fields: *localized_text_fields }
          - { label: "Submit Button Text", name: "submitButtonText", widget: "object", fields: *localized_text_fields }
          - { label: "Success Message", name: "successMessage", widget: "object", fields: *localized_text_fields }
          - { label: "Error Message", name: "errorMessage", widget: "object", fields: *localized_text_fields }
          - label: "Fields"
            name: "fields"
            widget: "object"
            fields:
              - { label: "Company / Hotel Name", name: "companyName", widget: "object", fields: [{ label: "Label", name: "label", widget: "object", fields: *localized_text_fields }, { label: "Placeholder", name: "placeholder", widget: "object", fields: *localized_text_fields }] }
              - { label: "Contact Person", name: "contactPerson", widget: "object", fields: [{ label: "Label", name: "label", widget: "object", fields: *localized_text_fields }, { label: "Placeholder", name: "placeholder", widget: "object", fields: *localized_text_fields }] }
              - { label: "Phone", name: "phone", widget: "object", fields: [{ label: "Label", name: "label", widget: "object", fields: *localized_text_fields }, { label: "Placeholder", name: "placeholder", widget: "object", fields: *localized_text_fields }] }
              - { label: "Email", name: "email", widget: "object", fields: [{ label: "Label", name: "label", widget: "object", fields: *localized_text_fields }, { label: "Placeholder", name: "placeholder", widget: "object", fields: *localized_text_fields }] }
              - { label: "Product Interest", name: "productInterest", widget: "object", fields: [{ label: "Label", name: "label", widget: "object", fields: *localized_text_fields }, { label: "Placeholder", name: "placeholder", widget: "object", fields: *localized_text_fields }] }
              - { label: "Selected Material", name: "selectedMaterial", widget: "object", fields: [{ label: "Label", name: "label", widget: "object", fields: *localized_text_fields }, { label: "Placeholder", name: "placeholder", widget: "object", fields: *localized_text_fields }] }
              - { label: "Selected Price", name: "selectedPrice", widget: "object", fields: [{ label: "Label", name: "label", widget: "object", fields: *localized_text_fields }, { label: "Placeholder", name: "placeholder", widget: "object", fields: *localized_text_fields }] }
              - { label: "Unit", name: "unit", widget: "object", fields: [{ label: "Label", name: "label", widget: "object", fields: *localized_text_fields }, { label: "Placeholder", name: "placeholder", widget: "object", fields: *localized_text_fields }] }
              - { label: "Approximate Quantity / Rooms", name: "quantity", widget: "object", fields: [{ label: "Label", name: "label", widget: "object", fields: *localized_text_fields }, { label: "Placeholder", name: "placeholder", widget: "object", fields: *localized_text_fields }] }
              - { label: "Message", name: "message", widget: "object", fields: [{ label: "Label", name: "label", widget: "object", fields: *localized_text_fields }, { label: "Placeholder", name: "placeholder", widget: "object", fields: *localized_text_fields }] }

  - name: "process_english"
    label: "Process English"
    files:
      - name: "process_en"
        label: "English Process"
        file: "src/content/process.en.json"
        editor:
          preview: false
        fields: &process_fields
          - { label: "Show Process", name: "isVisible", widget: "boolean", default: true }
          - { label: "Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - label: "Steps"
            name: "steps"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Icon", name: "icon", widget: "select", options: ["MousePointerClick", "MessagesSquare", "FileText", "BadgeCheck", "Truck", "Sparkles", "Ruler"] }
              - { label: "Show Step", name: "isVisible", widget: "boolean", default: true }
              - { label: "Sort Order", name: "sortOrder", widget: "number", value_type: "int" }

  - name: "process_georgian"
    label: "Process Georgian"
    files:
      - name: "process_ge"
        label: "Georgian Process"
        file: "src/content/process.ge.json"
        editor:
          preview: false
        fields: *process_fields

  - name: "footer_settings"
    label: "Footer Settings"
    files:
      - name: "footer"
        label: "Footer"
        file: "src/content/footer.json"
        editor:
          preview: false
        fields:
          - { label: "Show Footer", name: "isVisible", widget: "boolean", default: true }
          - { label: "Tagline", name: "tagline", widget: "object", fields: *localized_text_fields }
          - { label: "Copyright", name: "copyright", widget: "object", fields: *localized_text_fields }
          - { label: "Social Title", name: "socialTitle", widget: "object", fields: *localized_text_fields }
