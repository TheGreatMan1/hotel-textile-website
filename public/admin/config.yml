backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "public/uploads/images"
public_folder: "/uploads/images"

collections:
  - name: "site_settings"
    label: "Site Settings"
    files:
      - name: "global_settings"
        label: "Global Site Settings"
        file: "src/content/settings.json"
        editor:
          preview: false
        fields:
          - { label: "Site Name", name: "siteName", widget: "string" }
          - label: "Default Language"
            name: "defaultLanguage"
            widget: "select"
            options: ["en", "ge"]
          - { label: "SEO Title", name: "seoTitle", widget: "string" }
          - { label: "SEO Description", name: "seoDescription", widget: "text" }
          - { label: "Admin Note", name: "adminNote", widget: "text", required: false }

  - name: "english_page_content"
    label: "English Page Content"
    files:
      - name: "english_site_content"
        label: "English Header, Hero, About, Footer"
        file: "src/content/site.en.json"
        editor:
          preview: false
        fields:
          - { label: "Brand Name", name: "brandName", widget: "string" }
          - { label: "Header Tagline", name: "tagline", widget: "string" }
          - label: "Navigation Links"
            name: "navLinks"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Link", name: "href", widget: "string" }
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Show Hero Section", name: "isVisible", widget: "boolean", default: true }
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Headline", name: "headline", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "text" }
              - { label: "Primary Button Text", name: "ctaText", widget: "string" }
              - { label: "Primary Button Link", name: "ctaLink", widget: "string" }
              - { label: "Secondary Button Text", name: "secondaryCtaText", widget: "string" }
              - { label: "Secondary Button Link", name: "secondaryCtaLink", widget: "string" }
              - { label: "Hero Image", name: "image", widget: "image" }
              - { label: "Hero Image Alt Text", name: "imageAlt", widget: "string" }
          - label: "About Section"
            name: "about"
            widget: "object"
            fields:
              - { label: "Show About Section", name: "isVisible", widget: "boolean", default: true }
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "About Image", name: "image", widget: "image" }
              - { label: "About Image Alt Text", name: "imageAlt", widget: "string" }
              - label: "Feature Points"
                name: "features"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Footer Tagline", name: "tagline", widget: "text" }
              - { label: "Copyright Text", name: "copyright", widget: "string" }

  - name: "georgian_page_content"
    label: "Georgian Page Content"
    files:
      - name: "georgian_site_content"
        label: "Georgian Header, Hero, About, Footer"
        file: "src/content/site.ge.json"
        editor:
          preview: false
        fields:
          - { label: "Brand Name", name: "brandName", widget: "string" }
          - { label: "Header Tagline", name: "tagline", widget: "string" }
          - label: "Navigation Links"
            name: "navLinks"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Link", name: "href", widget: "string" }
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Show Hero Section", name: "isVisible", widget: "boolean", default: true }
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Headline", name: "headline", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "text" }
              - { label: "Primary Button Text", name: "ctaText", widget: "string" }
              - { label: "Primary Button Link", name: "ctaLink", widget: "string" }
              - { label: "Secondary Button Text", name: "secondaryCtaText", widget: "string" }
              - { label: "Secondary Button Link", name: "secondaryCtaLink", widget: "string" }
              - { label: "Hero Image", name: "image", widget: "image" }
              - { label: "Hero Image Alt Text", name: "imageAlt", widget: "string" }
          - label: "About Section"
            name: "about"
            widget: "object"
            fields:
              - { label: "Show About Section", name: "isVisible", widget: "boolean", default: true }
              - { label: "Eyebrow", name: "eyebrow", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "About Image", name: "image", widget: "image" }
              - { label: "About Image Alt Text", name: "imageAlt", widget: "string" }
              - label: "Feature Points"
                name: "features"
                widget: "list"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Description", name: "description", widget: "text" }
          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Footer Tagline", name: "tagline", widget: "text" }
              - { label: "Copyright Text", name: "copyright", widget: "string" }

  - name: "english_products"
    label: "English Products"
    files:
      - name: "products_en"
        label: "English Product List"
        file: "src/content/products.en.json"
        editor:
          preview: false
        fields:
          - { label: "Show Products Section", name: "isVisible", widget: "boolean", default: true }
          - { label: "Section Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Section Title", name: "title", widget: "string" }
          - { label: "Section Description", name: "description", widget: "text" }
          - label: "Products"
            name: "items"
            widget: "list"
            summary: "{{fields.sortOrder}}. {{fields.title}}"
            fields:
              - { label: "Slug", name: "slug", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Category", name: "category", widget: "string" }
              - { label: "Short Description", name: "shortDescription", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Image Alt Text", name: "imageAlt", widget: "string" }
              - { label: "Button Text", name: "buttonText", widget: "string" }
              - { label: "Button Link", name: "buttonLink", widget: "string", required: false }
              - { label: "Show Product", name: "isVisible", widget: "boolean", default: true }
              - { label: "Sort Order", name: "sortOrder", widget: "number", value_type: "int", min: 1 }

  - name: "georgian_products"
    label: "Georgian Products"
    files:
      - name: "products_ge"
        label: "Georgian Product List"
        file: "src/content/products.ge.json"
        editor:
          preview: false
        fields:
          - { label: "Show Products Section", name: "isVisible", widget: "boolean", default: true }
          - { label: "Section Eyebrow", name: "eyebrow", widget: "string" }
          - { label: "Section Title", name: "title", widget: "string" }
          - { label: "Section Description", name: "description", widget: "text" }
          - label: "Products"
            name: "items"
            widget: "list"
            summary: "{{fields.sortOrder}}. {{fields.title}}"
            fields:
              - { label: "Slug", name: "slug", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Category", name: "category", widget: "string" }
              - { label: "Short Description", name: "shortDescription", widget: "text" }
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Image Alt Text", name: "imageAlt", widget: "string" }
              - { label: "Button Text", name: "buttonText", widget: "string" }
              - { label: "Button Link", name: "buttonLink", widget: "string", required: false }
              - { label: "Show Product", name: "isVisible", widget: "boolean", default: true }
              - { label: "Sort Order", name: "sortOrder", widget: "number", value_type: "int", min: 1 }

  - name: "gallery"
    label: "Gallery"
    files:
      - name: "gallery_settings"
        label: "Gallery Images"
        file: "src/content/gallery.json"
        editor:
          preview: false
        fields:
          - { label: "Show Gallery Section", name: "isVisible", widget: "boolean", default: true }
          - label: "Eyebrow"
            name: "eyebrow"
            widget: "object"
            fields:
              - { label: "English", name: "en", widget: "string" }
              - { label: "Georgian", name: "ge", widget: "string" }
          - label: "Title"
            name: "title"
            widget: "object"
            fields:
              - { label: "English", name: "en", widget: "string" }
              - { label: "Georgian", name: "ge", widget: "string" }
          - label: "Description"
            name: "description"
            widget: "object"
            fields:
              - { label: "English", name: "en", widget: "text" }
              - { label: "Georgian", name: "ge", widget: "text" }
          - label: "Images"
            name: "images"
            widget: "list"
            summary: "{{fields.sortOrder}}. {{fields.caption.en}}"
            fields:
              - { label: "Image", name: "image", widget: "image" }
              - { label: "Alt Text", name: "alt", widget: "string" }
              - label: "Caption"
                name: "caption"
                widget: "object"
                fields:
                  - { label: "English", name: "en", widget: "string" }
                  - { label: "Georgian", name: "ge", widget: "string" }
              - { label: "Show Image", name: "isVisible", widget: "boolean", default: true }
              - { label: "Sort Order", name: "sortOrder", widget: "number", value_type: "int", min: 1 }

  - name: "catalog_settings"
    label: "Catalog Settings"
    files:
      - name: "catalog"
        label: "Catalog PDF"
        file: "src/content/catalog.json"
        editor:
          preview: false
        fields:
          - { label: "Show Catalog Section", name: "isVisible", widget: "boolean", default: true }
          - label: "Title"
            name: "title"
            widget: "object"
            fields:
              - { label: "English", name: "en", widget: "string" }
              - { label: "Georgian", name: "ge", widget: "string" }
          - label: "Description"
            name: "description"
            widget: "object"
            fields:
              - { label: "English", name: "en", widget: "text" }
              - { label: "Georgian", name: "ge", widget: "text" }
          - label: "Button Text"
            name: "buttonText"
            widget: "object"
            fields:
              - { label: "English", name: "en", widget: "string" }
              - { label: "Georgian", name: "ge", widget: "string" }
          - label: "No PDF Text"
            name: "noFileText"
            widget: "object"
            fields:
              - { label: "English", name: "en", widget: "string" }
              - { label: "Georgian", name: "ge", widget: "string" }
          - label: "Catalog PDF File"
            name: "pdfFile"
            widget: "file"
            required: false
            media_folder: "public/uploads/catalog"
            public_folder: "/uploads/catalog"

  - name: "contact_settings"
    label: "Contact Settings"
    files:
      - name: "contact"
        label: "Contact Content and Methods"
        file: "src/content/contact.json"
        editor:
          preview: false
        fields:
          - { label: "Show Contact Section", name: "isVisible", widget: "boolean", default: true }
          - label: "Section Title"
            name: "title"
            widget: "object"
            fields:
              - { label: "English", name: "en", widget: "string" }
              - { label: "Georgian", name: "ge", widget: "string" }
          - label: "Section Description"
            name: "description"
            widget: "object"
            fields:
              - { label: "English", name: "en", widget: "text" }
              - { label: "Georgian", name: "ge", widget: "text" }
          - label: "Contact Methods"
            name: "methods"
            widget: "list"
            summary: "{{fields.key}} - {{fields.value}}"
            fields:
              - label: "Method"
                name: "key"
                widget: "select"
                options: ["phone", "whatsapp", "email", "instagram", "facebook"]
              - { label: "Show This Method", name: "isVisible", widget: "boolean", default: true }
              - label: "Label"
                name: "label"
                widget: "object"
                fields:
                  - { label: "English", name: "en", widget: "string" }
                  - { label: "Georgian", name: "ge", widget: "string" }
              - { label: "Displayed Value", name: "value", widget: "string" }
              - { label: "URL or Link", name: "url", widget: "string", required: false }

  - name: "map_settings"
    label: "Map Settings"
    files:
      - name: "map"
        label: "Location and Google Map"
        file: "src/content/map.json"
        editor:
          preview: false
        fields:
          - { label: "Show Map Section", name: "isVisible", widget: "boolean", default: true }
          - label: "Title"
            name: "title"
            widget: "object"
            fields:
              - { label: "English", name: "en", widget: "string" }
              - { label: "Georgian", name: "ge", widget: "string" }
          - label: "Address"
            name: "address"
            widget: "object"
            fields:
              - { label: "English", name: "en", widget: "text" }
              - { label: "Georgian", name: "ge", widget: "text" }
          - { label: "Google Maps Embed URL", name: "embedUrl", widget: "string", required: false }
          - label: "Map Button Text"
            name: "buttonText"
            widget: "object"
            fields:
              - { label: "English", name: "en", widget: "string" }
              - { label: "Georgian", name: "ge", widget: "string" }
          - { label: "External Google Maps Link", name: "externalLink", widget: "string", required: false }
